<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Personal Blog</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans&display=swap" rel="stylesheet">
    <!-- Highlight.js for code syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/default.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <h1>My Personal Blog</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="blog.html">Blog</a></li>
                    <li><a href="resume.html">Resume(EN)</a></li>
                    <li><a href="resume-cn.html">简历(CN)</a></li>
                </ul>
            </nav>
        </div>
    </header>
    
    <main>
        <section class="blog-section">
            <div class="container">
                <div class="section-header">
                    <h2>Blog Posts</h2>
                    <button id="add-post-btn" class="submit-btn">Add New Post</button>
                </div>
                
                <!-- Add Post Form -->
                <div id="add-post-form" class="add-post-form" style="display: none;">
                    <h3>Add New Blog Post</h3>
                    <form>
                        <div class="form-group">
                            <label for="post-title">Title</label>
                            <input type="text" id="post-title" name="post-title" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="post-content">Content (Markdown supported)</label>
                            <textarea id="post-content" name="post-content" rows="10" required></textarea>
                        </div>
                        
                        <!-- Image Upload -->
                        <div class="form-group">
                            <label for="post-image">Upload Image</label>
                            <div class="image-upload-input" id="image-upload-area">
                                <span>Click or drag image here</span>
                                <input type="file" id="post-image" name="post-image" accept="image/*">
                            </div>
                            <div class="image-upload-preview" id="image-preview" style="display: none;"></div>
                        </div>
                        
                        <div class="form-actions">
                            <button type="submit" class="submit-btn">Publish Post</button>
                            <button type="button" class="submit-btn cancel-btn" onclick="document.getElementById('add-post-form').style.display='none'">Cancel</button>
                        </div>
                    </form>
                </div>
                
                <div id="blog-posts-container" class="blog-posts">
                    <!-- Blog posts will be loaded here by JavaScript -->
                </div>
                
                <!-- Password Authentication Modal -->
                <div id="auth-modal" class="auth-modal">
                    <div class="auth-modal-content">
                        <h3>Enter Password to Edit</h3>
                        <input type="password" id="password-input" placeholder="Enter password">
                        <div class="modal-actions">
                            <button onclick="verifyPassword()">Submit</button>
                            <button class="cancel" onclick="cancelEditMode()">Cancel</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    
    <footer>
        <div class="container">
            <p>&copy; 2023 My Personal Blog. All rights reserved.</p>
        </div>
    </footer>
    <script src="script.js"></script>
    <script>
        // Load blog posts when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadBlogPosts();
        });

        // Handle form submission to create blog post
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const title = document.getElementById('post-title').value;
            const content = document.getElementById('post-content').value;
            
            // Update localStorage with post info
            const posts = JSON.parse(localStorage.getItem('blogPosts') || '[]');
            posts.push({
                id: posts.length,
                title,
                content, // Store content directly in localStorage
                date: new Date().toISOString()
            });
            localStorage.setItem('blogPosts', JSON.stringify(posts));
            
            // Refresh list and reset form
            loadBlogPosts();
            this.reset();
            document.getElementById('add-post-form').style.display = 'none';
        });
        
        // Load blog posts from localStorage
        function loadBlogPosts() {
            const posts = JSON.parse(localStorage.getItem('blogPosts') || '[]');
            const container = document.getElementById('blog-posts-container');
            
            if (posts.length === 0) {
                container.innerHTML = '<p class="no-posts">No blog posts yet. Create your first post!</p>';
                return;
            }
            
            container.innerHTML = posts.map(post => 
                `<div class="post-preview">
                    <h3>${post.title}</h3>
                    <p class="post-meta">${new Date(post.date).toLocaleDateString()}</p>
                    <div class="post-actions">
                        <a href="post.html?id=${post.id}" class="read-more">Read More</a>
                        <button class="delete-post-btn submit-btn" data-id="${post.id}">Delete</button>
                    </div>
                </div>`
            ).join('');
            
            // Add event listeners to delete buttons
            document.querySelectorAll('.delete-post-btn').forEach(button => {
                button.addEventListener('click', function() {
                    showAuthModal();
                    
                    // Override verifyPassword to handle deletion
                    window.verifyPassword = function() {
                        const passwordInput = document.getElementById('password-input');
                        const password = passwordInput.value;
                        
                        // Check if password is correct (ZBS88888888)
                        if (password === 'ZBS88888888') {
                            // Close modal
                            const modal = document.getElementById('auth-modal');
                            if (modal) {
                                modal.style.display = 'none';
                            }
                            
                            // Clear password input
                            passwordInput.value = '';
                            
                            // Delete the post
                            const postId = parseInt(button.getAttribute('data-id'));
                            deleteBlogPost(postId);
                        } else {
                            alert('Incorrect password. Please try again.');
                        }
                    };
                });
            });
        }
        
        // Delete a blog post
        function deleteBlogPost(id) {
            if (confirm('Are you sure you want to delete this post?')) {
                const posts = JSON.parse(localStorage.getItem('blogPosts') || '[]');
                const updatedPosts = posts.filter(post => post.id !== id);
                
                // Re-index the posts
                const reindexedPosts = updatedPosts.map((post, index) => {
                    return {...post, id: index};
                });
                
                localStorage.setItem('blogPosts', JSON.stringify(reindexedPosts));
                loadBlogPosts();
            }
        }
    </script>
</body>
</html>
